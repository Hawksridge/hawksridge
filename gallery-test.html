    <style>
        /* Single-column, uncropped stacked layout (test page) */
        .stack {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }
        .stack-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stack-item img {
            display: block;
            max-width: 100%;
            height: auto;          /* preserve aspect ratio, no cropping */
            max-height: 85vh;       /* keep tall portraits from overflowing the viewport */
            width: auto;
            object-fit: contain;
        }
        .stack-item figcaption {
            margin-top: var(--spacing-sm);
            text-align: center;
        }
        .stack-title {
            display: block;
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--color-text);
        }
        .stack-location {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-lighter);
            margin-top: 0.25rem;
        }
        .test-banner {
            max-width: 1000px;
            margin: 0 auto var(--spacing-lg);
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px dashed var(--color-border);
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--color-text-light);
            text-align: center;
        }
        .stack-section { display: none; }
        .stack-section.active { display: flex; flex-direction: column; gap: var(--spacing-xl); }
    </style>

    <script>
        const options = document.querySelectorAll('.toggle-option');
        const sections = document.querySelectorAll('.stack-section');
        function show(filter) {
            options.forEach(o => o.classList.toggle('active', o.dataset.filter === filter));
            sections.forEach(s => s.classList.toggle('active', s.dataset.type === filter));
            window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
        }
        options.forEach(o => o.addEventListener('click', () => show(o.dataset.filter)));
    </script>
